          </div>
        </div>

      <div class="add-bl-btn-container">
        <button class="add-button" type="button" id="add-bl-row-btn">AGREGAR FILA</button>
      </div>
    </div>
  </div>
  <script>
    // LÓGICA DE AGREGAR Y ELIMINAR FILAS DEL BL
    document.addEventListener('click', function (e) {

      // 1. ELIMINAR FILA
      const deleteBtn = e.target.closest('.delete-bl-row');
      if (deleteBtn) {
        const row = deleteBtn.closest('.bl-row');
        const container = row.parentElement;

        // Evitamos borrar si es la única fila que queda
        if (container.querySelectorAll('.bl-row').length > 1) {
          row.remove();
        } else {
          // Si es la última, solo limpiamos su contenido
          row.querySelectorAll('[contenteditable="true"]').forEach(el => el.innerText = '');
        }
      }

      // 2. AGREGAR FILA
      const addBtn = e.target.closest('#add-bl-row-btn');
      if (addBtn) {
        const container = document.querySelector('.bl-table-container');
        const rows = container.querySelectorAll('.bl-row');

        if (rows.length > 0) {
          const lastRow = rows[rows.length - 1];
          const newRow = lastRow.cloneNode(true);

          // Limpiar el texto clonado de la nueva fila
          newRow.querySelectorAll('[contenteditable="true"]').forEach(el => {
            el.innerText = '';
          });

          container.appendChild(newRow);
        }
      }

    });
  </script>
