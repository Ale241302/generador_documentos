  <script>
    // =========================================================
    // 0. SINCRONIZACIÓN DE CAMPOS ESPEJO (AWB)
    // =========================================================
    document.addEventListener('input', function (e) {
      // Sincronizar Grupo 1: input-1, input-4, input-6
      if (e.target.matches('.input-1, .input-4, .input-6')) {
        const valor = e.target.innerHTML;
        document.querySelectorAll('.input-1, .input-4, .input-6').forEach(el => {
          if (el !== e.target) el.innerHTML = valor;
        });
      }

      // Sincronizar Grupo 2: input-3, input-5, input-7
      if (e.target.matches('.input-3, .input-5, .input-7')) {
        const valor = e.target.innerHTML;
        document.querySelectorAll('.input-3, .input-5, .input-7').forEach(el => {
          if (el !== e.target) el.innerHTML = valor;
        });
      }
    });
    // =========================================================
    // 1. LÓGICA DE CÁLCULO DE TOTALES AUTOMÁTICOS
    // =========================================================
    function calcularTotalesAWB() {
      let sumPieces = 0;
      let sumGrossWeight = 0;
      let sumTotalAmount = 0;
      let sharedUnit = ''; // kg o lb

      // Recorremos solo las filas de datos, ignorando la de totales
      const rows = document.querySelectorAll('.awb-row');

      rows.forEach(row => {
        // 1. Sumar Pieces
        const pieces = parseFloat(row.querySelector('.col-pieces').innerText) || 0;
        sumPieces += pieces;

        // 2. Sumar Gross Weight
        const weight = parseFloat(row.querySelector('.col-grossweight').innerText) || 0;
        sumGrossWeight += weight;

        // 3. Replicar kg/lb (toma el valor de la primera celda que no esté vacía)
        const unit = row.querySelector('.col-kglb').innerText.trim();
        if (unit !== '' && sharedUnit === '') {
          sharedUnit = unit;
        }

        // 4. Sumar Total
        const total = parseFloat(row.querySelector('.col-total').innerText) || 0;
        sumTotalAmount += total;
      });

      // Escribir los resultados en la fila de totales (solo si hay valor mayor a 0)
      document.querySelector('.val-total-pieces').innerText = sumPieces > 0 ? sumPieces : '';
      document.querySelector('.val-total-grossweight').innerText = sumGrossWeight > 0 ? sumGrossWeight : '';
      document.querySelector('.val-total-kglb').innerText = sharedUnit;
      document.querySelector('.val-total-amount').innerText = sumTotalAmount > 0 ? sumTotalAmount.toFixed(2) : '';
      // Nota: .toFixed(2) asegura que el total monetario tenga 2 decimales (ej. 150.50). 
    }

    // Escuchar cuando el usuario escribe en cualquier parte de la tabla
    document.querySelector('.awb-table-container').addEventListener('input', function (e) {
      // Solo recalcular si se escribió en una de las columnas relevantes
      if (e.target.classList.contains('col-pieces') ||
        e.target.classList.contains('col-grossweight') ||
        e.target.classList.contains('col-kglb') ||
        e.target.classList.contains('col-total')) {
        calcularTotalesAWB();
      }
    });

    // =========================================================
    // 2. LÓGICA DE AGREGAR Y ELIMINAR FILAS AWB (MAX 10, UNA HOJA)
    // =========================================================
    document.addEventListener('click', function (e) {

      // --- ELIMINAR FILA ---
      const deleteBtn = e.target.closest('.delete-awb-row');
      if (deleteBtn) {
        const row = deleteBtn.closest('.awb-row');
        const container = row.parentElement;

        // Si hay más de una fila, la borramos
        if (container.querySelectorAll('.awb-row').length > 1) {
          row.remove();
        } else {
          // Si es la última que queda, solo limpiamos los textos
          row.querySelectorAll('[contenteditable="true"]').forEach(el => el.innerText = '');
        }

        // ¡NUEVO!: Forzamos el recálculo para que el total baje si se eliminó un valor
        setTimeout(calcularTotalesAWB, 50);
      }

      // --- AGREGAR FILA ---
      const addBtn = e.target.closest('#add-awb-row-btn');
      if (addBtn) {
        const container = addBtn.closest('.awb-table-container');
        const rows = container.querySelectorAll('.awb-row');

        // LÍMITE: 10 FILAS MÁXIMO
        if (rows.length < 10) {
          const lastRow = rows[rows.length - 1];
          const newRow = lastRow.cloneNode(true);

          // Limpiamos los textos clonados
          newRow.querySelectorAll('[contenteditable="true"]').forEach(el => el.innerText = '');

          // Insertamos la nueva fila justo ANTES de la fila de totales o el botón
          // (Se inserta antes del elemento que contiene el botón de agregar)
          container.insertBefore(newRow, addBtn.closest('.add-awb-btn-container').previousElementSibling || addBtn.closest('.add-awb-btn-container'));

          // Recalculamos por seguridad
          setTimeout(calcularTotalesAWB, 50);
        } else {
          // Mostrar alerta si intentan agregar más de 10
          alert("Has alcanzado el límite máximo de 10 registros para este documento.");
        }
      }
    });

    // =========================================================
    // 3. LÓGICA DE MARCAS DE AGUA GIGANTE
    // =========================================================
    let activeWatermark = null;

    document.querySelector('.watermark-controls').addEventListener('click', function (e) {
      if (e.target.classList.contains('watermark-tag')) {
        const clickedText = e.target.getAttribute('data-text');
        const allTags = document.querySelectorAll('.watermark-tag');

        if (activeWatermark === clickedText) {
          // Apagar si ya estaba activa
          activeWatermark = null;
          allTags.forEach(tag => tag.classList.remove('active'));
          aplicarMarcaDeAguaATodas('');
        } else {
          // Encender nueva
          activeWatermark = clickedText;
          allTags.forEach(tag => tag.classList.remove('active'));
          e.target.classList.add('active');
          aplicarMarcaDeAguaATodas(clickedText);
        }
      }
    });

    function aplicarMarcaDeAguaATodas(texto) {
      const displays = document.querySelectorAll('.watermark-display');
      displays.forEach(display => {
        if (texto === '') {
          display.textContent = '';
          display.classList.remove('active');
        } else {
          display.textContent = texto;
          display.classList.add('active');
        }
      });
    }
  </script>
